databases:
  - name: needsmesh-db
    databaseName: needsmesh
    user: needsmesh

services:
  - type: web
    name: needsmesh-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn NeedsMesh.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: needsmesh-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"
