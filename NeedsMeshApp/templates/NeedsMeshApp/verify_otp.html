{% extends 'NeedsMeshApp/base.html' %}
{% load static %}
{% block title %}Verify OTP – NeedsMesh{% endblock %}

{% block content_auth %}
<div class="auth-card animate fadeIn">
  <div class="auth-logo mb-4">
    <div class="bg-warning bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
      <i class="bi bi-key-fill fs-1 text-warning"></i>
    </div>
    <h2 class="fw-bold text-primary">Verify OTP</h2>
    <p class="text-muted small">Enter the 6-digit code sent to your email.</p>
  </div>

  <form method="post" novalidate class="mt-4">
    {% csrf_token %}
    <div class="mb-4">
      <label class="form-label small fw-bold text-muted text-uppercase">One-Time Password</label>
      <div class="input-group mb-2 border rounded-3 p-1 bg-white shadow-sm">
        <span class="input-group-text bg-transparent border-0 text-muted"><i class="bi bi-key"></i></span>
        <input type="text" name="otp" class="form-control border-0 bg-transparent text-center fw-bold fs-4"
          placeholder="• • • • • •" maxlength="6" pattern="[0-9]{6}" required autofocus
          style="letter-spacing: 0.5rem;">
      </div>
      <div class="tiny text-muted text-center">Code expires in 10 minutes</div>
    </div>

    <button type="submit" class="btn btn-primary-custom w-100 py-3 shadow-sm">
      <i class="bi bi-check-circle-fill me-2"></i>Verify Code
    </button>
  </form>

  <div class="d-flex justify-content-between mt-4">
    <a href="{% url 'forgot_password' %}" class="text-muted small text-decoration-none">
      <i class="bi bi-arrow-counterclockwise me-1"></i>Resend Code
    </a>
    <a href="{% url 'login' %}" class="text-muted small text-decoration-none">
      <i class="bi bi-arrow-left me-1"></i>Back to Login
    </a>
  </div>
</div>
{% endblock %}
