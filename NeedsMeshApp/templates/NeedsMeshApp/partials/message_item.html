<div class="d-flex mb-3 message-item animate fadeIn" id="msg-{{ msg.pk }}">
  <div class="avatar-sm {% if msg.sender.profile.role == 'admin' %}bg-primary text-white{% else %}bg-secondary text-white{% endif %} rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 38px; height: 38px;">
    {{ msg.sender.profile.full_name|first|upper }}
  </div>
  <div class="message-bubble bg-white p-3 rounded-4 shadow-sm border border-light flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-1">
      <span class="fw-bold small">{{ msg.sender.profile.full_name }} {% if msg.sender.profile.role == 'admin' %}<span class="badge bg-primary ms-1 tiny">ADMIN</span>{% endif %}</span>
      <span class="text-muted tiny">{{ msg.timestamp|date:"M d, H:i" }}</span>
    </div>
    <div class="small text-dark">{{ msg.content|linebreaksbr }}</div>
  </div>
</div>
