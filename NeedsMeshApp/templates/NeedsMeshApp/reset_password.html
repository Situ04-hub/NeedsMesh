{% extends 'NeedsMeshApp/base.html' %}
{% load static %}
{% block title %}New Password – NeedsMesh{% endblock %}

{% block content_auth %}
<div class="auth-card animate fadeIn">
  <div class="auth-logo mb-4">
    <div class="bg-success bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
      <i class="bi bi-lock-fill fs-1 text-success"></i>
    </div>
    <h2 class="fw-bold text-primary">Set New Password</h2>
    <p class="text-muted small">Choose a strong password for <span class="fw-bold text-dark">{{ reset_user.username }}</span></p>
  </div>

  <form method="post" novalidate class="mt-4">
    {% csrf_token %}
    <div class="mb-4">
      <label class="form-label small fw-bold text-muted text-uppercase">New Password</label>
      <div class="input-group border rounded-3 p-1 bg-white shadow-sm">
        <span class="input-group-text bg-transparent border-0 text-muted"><i class="bi bi-lock"></i></span>
        <input type="password" name="password1" class="form-control border-0 bg-transparent"
          placeholder="Minimum 8 characters" required minlength="8">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label small fw-bold text-muted text-uppercase">Confirm Password</label>
      <div class="input-group border rounded-3 p-1 bg-white shadow-sm">
        <span class="input-group-text bg-transparent border-0 text-muted"><i class="bi bi-lock-fill"></i></span>
        <input type="password" name="password2" class="form-control border-0 bg-transparent"
          placeholder="Re-enter password" required minlength="8">
      </div>
    </div>

    <button type="submit" class="btn btn-primary-custom w-100 py-3 shadow-sm">
      <i class="bi bi-check2-circle me-2"></i>Reset Password
    </button>
  </form>

  <div class="text-center mt-4">
    <a href="{% url 'login' %}" class="text-muted small text-decoration-none">
      <i class="bi bi-arrow-left me-1"></i>Back to Login
    </a>
  </div>
</div>
{% endblock %}
