{% extends 'NeedsMeshApp/base.html' %}
{% load static %}
{% block title %}Forgot Password – NeedsMesh{% endblock %}

{% block content_auth %}
<div class="auth-card animate fadeIn">
  <div class="auth-logo mb-4">
    <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
      <i class="bi bi-shield-lock-fill fs-1 text-primary"></i>
    </div>
    <h2 class="fw-bold text-primary">Reset Password</h2>
    <p class="text-muted small">Enter your username or email to receive a one-time verification code.</p>
  </div>

  <form method="post" novalidate class="mt-4">
    {% csrf_token %}
    <div class="mb-4">
      <label class="form-label small fw-bold text-muted text-uppercase">Username or Email</label>
      <div class="input-group mb-3 border rounded-3 p-1 bg-white shadow-sm">
        <span class="input-group-text bg-transparent border-0 text-muted"><i class="bi bi-person-circle"></i></span>
        <input type="text" name="identifier" class="form-control border-0 bg-transparent"
          placeholder="Enter your username or email" required autofocus>
      </div>
    </div>

    <button type="submit" class="btn btn-primary-custom w-100 py-3 shadow-sm">
      <i class="bi bi-send-fill me-2"></i>Send OTP Code
    </button>
  </form>

  <div class="text-center mt-4">
    <a href="{% url 'login' %}" class="text-muted small text-decoration-none">
      <i class="bi bi-arrow-left me-1"></i>Back to Login
    </a>
  </div>
</div>
{% endblock %}
